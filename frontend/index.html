<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APTerritorial</title>
    <!--
      Restaura la ruta guardada por 404.html (truco SPA para GitHub Pages).
      Debe ejecutarse ANTES de que React/React Router carguen para que el router
      arranque ya con la URL correcta en history.
    -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('__spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('__spa_redirect');
          try {
            var r = JSON.parse(redirect);
            if (r.path && r.path !== '/') {
              window.history.replaceState(
                null,
                '',
                r.path + (r.search || '') + (r.hash || '')
              );
            }
          } catch (_) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
